# Experiment Configuration Template
#
# Copy this file and modify for each experiment.
# All experimental choices must be specified here — no hardcoded decisions.

# ─── Experiment Identification ───────────────────────────────────────
# Naming convention (morphological_matrix.md §5): eventsat_sas_<paradigm>_<rep>
#   paradigm: conventional | ag | ao | ah
#   rep:      symb | rl | hrl | llm-s | llm-a | hllm-s | hllm-a   (ao: symb/rl/hrl)
#   ah names both cores onboard-first: eventsat_sas_ah_<onboard>_<ground>
# Examples: eventsat_sas_ag_symb · eventsat_sas_ah_rl_llm-s · eventsat_sas_conventional_symb
experiment_id: "eventsat_sas_<paradigm>_<rep>"
description: "Brief description of experimental configuration"

# ─── Reproducibility ────────────────────────────────────────────────
seed: 42

# ─── Morphological Matrix Dimensions ────────────────────────────────
# agent_organization: sas | centralized_mas | decentralized_mas | independent_mas | hybrid_mas
# (Kim et al. 2025 "Towards a Science of Scaling Agent Systems")
agent_organization: "sas"

# decision_procedure: sda (fixed for current benchmarks)
decision_procedure: "sda"

# representation: a 7-cell framework token (morphological_matrix.md §2) —
#   symb | rl | hrl | llm-s | llm-a | hllm-s | hllm-a
# (legacy substrate values symbolic | subsymbolic | rl | llm | hybrid + an
#  action_space in representation_config are still accepted)
representation: "symb"

# behaviour: hand_designed | emergent
behaviour: "hand_designed"

# operations_paradigm: autonomous_onboard | autonomous_hybrid | autonomous_ground
#   | conventional_ground   (filename tokens: ao | ah | ag | conventional)
operations_paradigm: "autonomous_hybrid"

# ─── Component-Specific Configuration ───────────────────────────────

agent_organization_config:
  # SAS: no extra params needed
  # CentralizedMAS: manager + local agents, star topology
  # DecentralizedMAS: topology (ring | mesh | visibility) — deferred to N≥3
  {}

decision_procedure_config:
  # Loop-specific parameters (e.g. max_iterations, timeout)
  {}

representation_config:
  # Representation-specific parameters
  # Symbolic: rule set config
  # Hybrid: LLM model name, tool list
  # Subsymbolic: network architecture, checkpoint path
  {}

# ─── Dual-core Autonomous Hybrid (optional) ─────────────────────────
# For ah_<onboard>_<ground> with DIFFERENT cores, replace the single
# `representation`/`representation_config` above with nested onboard/ground blocks
# (each = its own representation + config). Onboard ∈ {symb, rl, hrl} (no per-step
# LLM onboard); ground ∈ the 7 cells. Omit both for single-rep AH / AO / AG / CG.
# onboard:
#   representation: rl
#   representation_config: {rl_mock: false, checkpoint_path: ''}
# ground:
#   representation: hllm-a
#   representation_config: {llm_model: qwen3.6:35b}

behaviour_config:
  # mode is inferred from top-level behaviour
  # mechanism: ppo (subsymbolic) | prompt_optimized (hybrid LLM) | writable_coala (agentic only)
  # For learned: training_checkpoint, policy_type
  {}

operations_paradigm_config:
  # For conventional_ground: default_mode, command_sequence_horizon
  {}

# ─── Environment Configuration ──────────────────────────────────────

environment:
  constellation_size: 1    # 1 (EventSat) | 3-12 (Flamingo) | 50-500 (Space Data Centers)
  timestep_seconds: 60
  max_steps: 1440          # 24 hours at 1-minute timesteps
  scenario: "eventsat"     # eventsat | flamingo | space_data_centers
  scenario_config: {}

# ─── Memory Configuration (fixed across all experiments) ────────────

memory_config:
  history_depth: 50

# ─── Execution Parameters ───────────────────────────────────────────

num_episodes: 100
max_steps: 1440            # Mirrors environment.max_steps

# ─── Metrics Configuration ──────────────────────────────────────────

metrics:
  enabled:
    - utility
    - latency
    - robustness
    - resource_efficiency
    - operator_load
    - explainability
    - scale_complexity        # tracked as a function of constellation_size x complexity_index
  collection_frequency: "per_step"   # per_step | per_episode

# ─── Output Configuration ───────────────────────────────────────────

output_dir: "data/results/${experiment_id}"
save_checkpoints: false
log_level: "INFO"
