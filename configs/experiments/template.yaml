# Experiment Configuration Template
#
# Copy this file and modify for each experiment.
# All experimental choices must be specified here — no hardcoded decisions.

# ─── Experiment Identification ───────────────────────────────────────
# Naming convention: <scenario>_<org>_<loop>_<repr>_<emrg>_<ops>
#   org:  cen | hier | dist
#   loop: sda | ooda | react
#   repr: symb | hybr | subm
#   emrg: hd | le
#   ops:  ah (autonomous_hybrid) | ag (autonomous_ground) | cg (conventional_ground)
# Example: eventsat_cen_sda_symb_hd_ah
experiment_id: "eventsat_<org>_<loop>_<repr>_<emrg>_<ops>"
description: "Brief description of experimental configuration"

# ─── Reproducibility ────────────────────────────────────────────────
seed: 42

# ─── Morphological Matrix Dimensions ────────────────────────────────
# agent_organization: centralized | hierarchical | distributed
agent_organization: "centralized"

# decision_loop: sda | ooda | react | <custom>
decision_loop: "sda"

# representation: symbolic | subsymbolic | hybrid
representation: "symbolic"

# emergence_mode: hand_designed | learned
emergence_mode: "hand_designed"

# operations_paradigm: autonomous_hybrid | conventional_ground
operations_paradigm: "autonomous_hybrid"

# ─── Component-Specific Configuration ───────────────────────────────

agent_organization_config:
  # Centralized: no extra params needed
  # Hierarchical: define manager/local split
  # Distributed: define topology (ring | mesh | visibility)
  {}

decision_loop_config:
  # Loop-specific parameters (e.g. max_iterations, timeout)
  {}

representation_config:
  # Representation-specific parameters
  # Symbolic: rule set config
  # Hybrid: LLM model name, tool list
  # Subsymbolic: network architecture, checkpoint path
  {}

emergence_config:
  # mode is inferred from top-level emergence_mode
  # For learned: training_checkpoint, policy_type
  {}

operations_paradigm_config:
  # For conventional_ground: default_mode, command_sequence_horizon
  {}

# ─── Environment Configuration ──────────────────────────────────────

environment:
  constellation_size: 1    # 1 (EventSat) | 3-12 (Flamingo) | 50-500 (Space Data Centers)
  timestep_seconds: 60
  max_steps: 1440          # 24 hours at 1-minute timesteps
  scenario: "eventsat"     # eventsat | flamingo | space_data_centers
  scenario_config: {}

# ─── Memory Configuration (fixed across all experiments) ────────────

memory_config:
  history_depth: 50

# ─── Execution Parameters ───────────────────────────────────────────

num_episodes: 100
max_steps: 1440            # Mirrors environment.max_steps

# ─── Metrics Configuration ──────────────────────────────────────────

metrics:
  enabled:
    - utility
    - latency
    - robustness
    - resource_efficiency
    - operator_load
    - explainability
    - scale_complexity        # tracked as a function of constellation_size x complexity_index
  collection_frequency: "per_step"   # per_step | per_episode

# ─── Scalability Configuration ──────────────────────────────────────
# Used for RQ3 experiments — sweep over both axes independently or jointly.
scalability:
  complexity_index: 0      # 0=centralized | 1=hierarchical | 2=distributed
  sweep_sizes: []          # e.g. [1, 5, 12, 50, 100, 500] for scaling experiments

# ─── Output Configuration ───────────────────────────────────────────

output_dir: "data/results/${experiment_id}"
save_checkpoints: false
log_level: "INFO"
