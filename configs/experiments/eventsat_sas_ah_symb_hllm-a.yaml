experiment_id: eventsat_sas_ah_symb_hllm-a
description: "EventSat \xB7 SAS \xB7 AH \xB7 symb onboard \xB7 hllm-a ground.\n"
seed: 42
agent_organization: sas
decision_procedure: sda
behaviour: hand_designed
operations_paradigm: autonomous_hybrid
agent_organization_config: {}
decision_procedure_config:
  sense_encode: true
  decide_act: true
# Dual-core AH: symbolic onboard core + agentic-hybrid-LLM ground planner.
# (The ground hllm-a planner currently resolves to a placeholder scheduler — the
# real LLM ground producer lands with the learned-scheduling increment.)
onboard:
  representation: symb
  representation_config: {}
ground:
  representation: hllm-a
  representation_config:
    llm_provider: auto
    llm_model: qwen3.6:35b
    openai_model: gpt-4o-mini
    llm_temperature: 0.0
    llm_mock: false
    llm_cache_dir: data/llm_cache
    max_agentic_steps: 5
behaviour_config:
  mode: hand_designed
operations_paradigm_config:
  orbital_period_steps: 93
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml
memory_config:
  history_depth: 100
num_episodes: 5
max_steps: 10080
metrics:
  enabled:
  - utility
  - latency
  - resource_efficiency
  - operator_load
  - explainability
  collection_frequency: per_step
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
