# EventSat | Centralized · SDA · Hybrid · Hand-designed · Autonomous-Hybrid
# ============================================================================
# 5D Morphological Matrix: sas | sda | hyre | hd | ah
#
# LLM hybrid representation with SDA reactive loop and autonomous onboard ops.
# The LLM reasons about mode selection each timestep; symbolic constraints
# ground the output. Compare with symbolic baseline (eventsat_sas_sda_symb_hd_ah).
#
# Papers: Rodriguez-Fernandez et al. (2024), Li (2025)

experiment_id: eventsat_sas_sda_hyre_hd_ah
description: >
  EventSat LLM hybrid representation with SDA loop and autonomous-hybrid ops.
  LLM reasons about mode selection with symbolic safety grounding. Baseline
  for hybrid representation comparison across loops and ops paradigms.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: sas        # cen
decision_procedure: sda                     # sda
representation: hybrid                 # hyre
behaviour: hand_designed          # hd
operations_paradigm: autonomous_hybrid # ah

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_procedure_config:
  sense_encode: true
  decide_act: true

representation_config:
  action_space: reactive
  # LLM provider configuration (configurable per deployment)
  llm_provider: auto          # "auto" (Ollama → OpenAI), "ollama", or "openai"
  llm_model: qwen3.5:122b         # Ollama model name (ignored if provider=openai)
  openai_model: gpt-4o-mini   # OpenAI model name (used as fallback or if provider=openai)
  llm_temperature: 0.0        # Deterministic for reproducibility
  llm_mock: false              # Set true for CI/testing (no live LLM calls)
  llm_cache_dir: data/llm_cache

behaviour_config:
  mode: hand_designed

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60            # 1-minute resolution
  max_steps: 10080                # 7 days = 7 * 24 * 60 = 10080 steps
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080                  # 7 days of 1-minute steps

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
    - explainability
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
