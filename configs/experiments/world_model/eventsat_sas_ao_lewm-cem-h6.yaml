experiment_id: eventsat_sas_ao_lewm-cem-h6
description: "EventSat - SAS - AO - LeWM-CEM (plan_hold=6). Re-plans every 6 min instead of
  12 for tighter pass alignment at 2x Jetson duty.
"
seed: 42
agent_organization: sas
decision_procedure: sda
behaviour: hand_designed
operations_paradigm: autonomous_onboard
agent_organization_config: {}
decision_procedure_config:
  sense_encode: true
  decide_act: true
behaviour_config:
  mode: hand_designed
operations_paradigm_config: {}
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml
memory_config:
  history_depth: 100
num_episodes: 5
max_steps: 10080
metrics:
  enabled:
  - utility
  - latency
  - resource_efficiency
  - operator_load
  - explainability
  collection_frequency: per_step
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
representation: rl
representation_config:
  type: lewm_cem_eventsat
  horizon: 12
  samples: 256
  elites: 32
  cem_iterations: 4
  cem_alpha: 0.7
  reserve_soc: 0.50
  plan_hold: 6
  mission_mode: science
  mission_weights: {}
  planner_artifact: /home/clemente/space-world-models/outputs/eventsat_autops_lewm/planner_artifact.json
  strict_artifact: true
  policy_artifact: ''
  training_steps: 0
