# EventSat | Hierarchical · OODA · Agentic · Hand-designed · Autonomous-Hybrid
# ============================================================================
# 5D Morphological Matrix: cmas | ooda | agnt | lep | ah

experiment_id: eventsat_cmas_ooda_agnt_lep_ah
description: >
  EventSat hierarchical Centralized MAS with OODA loop, agentic hybrid
  representation, and autonomous-hybrid ops. Manager Orient uses multi-step
  tool reasoning; local agent refines with directive context. Compare with
  eventsat_cen_ooda_agnt_lep_ah (SAS) to isolate hierarchical organization effect.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: centralized_mas       # hier
decision_loop: ooda                    # ooda
representation: hybrid                 # agnt (agentic subtype)
emergence_mode: learned                 # lep
operations_paradigm: autonomous_hybrid # ah

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_loop_config:
  orient_history_window: 10
  max_orient_iterations: 1
  urgency_bypass_threshold: 0.9

representation_config:
  type: agentic_eventsat
  llm_provider: auto
  llm_model: qwen3.5:122b
  openai_model: gpt-4o-mini
  llm_temperature: 0.0
  llm_mock: false
  llm_cache_dir: data/llm_cache
  max_agentic_steps: 3

emergence_config:
  mode: learned
  mechanism: prompt_optimized

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
    - explainability
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
