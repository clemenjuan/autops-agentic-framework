# EventSat | Hierarchical · ReAct · Agentic · Hand-designed · Autonomous-Hybrid
# ============================================================================
# 5D Morphological Matrix: cmas | react | hyag | lep | ah

experiment_id: eventsat_cmas_react_hyag_lep_ah
description: >
  EventSat hierarchical Centralized MAS with ReAct loop, agentic hybrid
  representation, and autonomous-hybrid ops. Manager CoALA ReAct cycle produces
  tool-reasoned directive; local agent refines with directive context. Compare
  with eventsat_cen_react_hyag_lep_ah (SAS) to isolate hierarchical org effect.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: centralized_mas        # hier
decision_procedure: react                    # react
representation: hybrid                  # hyag (agentic subtype)
behaviour: emergent                 # lep           # hd
operations_paradigm: autonomous_hybrid  # ah

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_procedure_config:
  max_iterations: 3
  grounding_checks:
    - battery_feasibility
    - pass_window_timing

representation_config:
  type: agentic_eventsat
  action_space: agentic
  llm_provider: auto
  llm_model: qwen3.5:122b
  openai_model: gpt-4o-mini
  llm_temperature: 0.0
  llm_mock: false
  llm_cache_dir: data/llm_cache
  max_agentic_steps: 3

behaviour_config:
  mode: emergent
  mechanism: prompt_optimized

operations_paradigm_config:
  default_mode: charging

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
    - explainability
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
