experiment_id: flamingo_hmas_ag_symb
description: "Flamingo-lite · HMAS · AG · symbolic baseline (clustered: coordinate within, independent across)."
seed: 42

agent_organization: hybrid_mas
decision_procedure: sda
representation: symb
behaviour: hand_designed
operations_paradigm: autonomous_ground

agent_organization_config:
  num_clusters: 2
decision_procedure_config:
  sense_encode: true
  decide_act: true
behaviour_config:
  mode: hand_designed
operations_paradigm_config:
  pass_through_observation: true

representation_config:
  type: rule_based_flamingo

environment:
  constellation_size: 3
  timestep_seconds: 60
  max_steps: 120
  scenario: flamingo
  scenario_config:
    scenario_file: configs/scenarios/flamingo.yaml

memory_config:
  history_depth: 50

num_episodes: 3
max_steps: 120

metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
    - explainability
  collection_frequency: per_step

output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
