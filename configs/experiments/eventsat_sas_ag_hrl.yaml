experiment_id: eventsat_sas_ag_hrl
description: "EventSat \xB7 SAS \xB7 ag \xB7 hrl.\n"
seed: 42
agent_organization: sas
decision_procedure: sda
behaviour: hand_designed
operations_paradigm: autonomous_ground
agent_organization_config: {}
decision_procedure_config:
  sense_encode: true
  decide_act: true
behaviour_config:
  mode: hand_designed
operations_paradigm_config:
  default_mode: charging
  orbital_period_steps: 93
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml
memory_config:
  history_depth: 100
num_episodes: 5
max_steps: 10080
metrics:
  enabled:
  - utility
  - latency
  - resource_efficiency
  - operator_load
  - explainability
  collection_frequency: per_step
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
representation: hrl
representation_config: {}
