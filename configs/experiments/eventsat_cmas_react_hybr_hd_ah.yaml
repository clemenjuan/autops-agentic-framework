# EventSat | Hierarchical · ReAct · LLM-Hybrid · Hand-designed · Autonomous-Hybrid
# ============================================================================
# 5D Morphological Matrix: cmas | react | hybr | hd | ah

experiment_id: eventsat_cmas_react_hybr_hd_ah
description: >
  EventSat hierarchical Centralized MAS with ReAct loop, LLM hybrid representation,
  and autonomous-hybrid ops. Manager LLM ReAct cycle produces directive; local
  agent LLM ReAct cycle refines with directive context. Compare with
  eventsat_cen_react_hybr_hd_ah (SAS) to isolate hierarchical organization effect.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: centralized_mas        # hier
decision_loop: react                    # react
representation: hybrid                  # hybr
emergence_mode: hand_designed           # hd
operations_paradigm: autonomous_hybrid  # ah

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_loop_config:
  max_iterations: 3
  grounding_checks:
    - battery_feasibility
    - pass_window_timing

representation_config:
  type: llm_eventsat
  llm_provider: auto
  llm_model: qwen3.5:122b
  openai_model: gpt-4o-mini
  llm_temperature: 0.0
  llm_mock: false
  llm_cache_dir: data/llm_cache

emergence_config:
  mode: hand_designed

operations_paradigm_config:
  default_mode: charging

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
    - explainability
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
