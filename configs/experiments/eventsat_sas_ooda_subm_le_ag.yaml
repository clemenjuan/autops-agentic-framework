# EventSat | Centralized · OODA · Subsymbolic · Learned · Autonomous-Ground
# ============================================================================
# 5D Morphological Matrix: sas | ooda | subm | le | ag

experiment_id: eventsat_sas_ooda_subm_le_ag
description: >
  EventSat RL subsymbolic representation with OODA loop and autonomous-ground ops.

seed: 42

agent_organization: sas
decision_loop: ooda
representation: subsymbolic
emergence_mode: learned
operations_paradigm: autonomous_ground

agent_organization_config: {}

decision_loop_config:
  observe: true
  orient: true
  decide: true
  act: true

representation_config:
  type: subsymbolic_eventsat
  rl_mock: false
  deterministic: false
  checkpoint_path: ""
  orbital_period_steps: 94
  max_steps: 10080
  compression_time_factor: 2.0
  detection_steps: 5
  jetson_capacity_mb: 249036.8

emergence_config:
  mechanism: ppo
  mode: learned
  rollout_fragment: 128
  lr: 1.0e-4
  lr_schedule:
    - [0, 1.0e-4]
    - [3000000, 1.0e-5]
  gamma: 0.97
  gae_lambda: 0.95
  clip_ratio: 0.3
  ppo_epochs: 30
  entropy_coef: 0.01
  value_coef: 1.0
  max_grad_norm: 0.5
  minibatch_size: 256

operations_paradigm_config:
  orbital_period_steps: 93

environment:
  constellation_size: 1
  timestep_seconds: 60
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

memory_config:
  history_depth: 100

num_episodes: 10
max_steps: 10080

metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
    - explainability
  collection_frequency: per_step

output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
