# EventSat | Centralized · SDA · Symbolic · Hand-designed · Conventional-Ground
# ==============================================================================
# 5D Morphological Matrix: cen | sda | symb | hd | cg
#
# Conventional ground operations: satellite has ZERO onboard autonomy between
# passes. During each pass the ground operator:
#   1. Receives fresh telemetry (housekeeping downlink)
#   2. Generates a time-tagged schedule covering the gap to the next pass
#   3. Uplinks the schedule; satellite executes it step-by-step
#
# Compare with eventsat_cen_sda_symb_hd_ah.yaml to quantify the performance
# cost of conventional ground operations vs. onboard autonomy.

experiment_id: eventsat_cen_sda_symb_hd_cg
description: >
  EventSat conventional ground operations. Centralized schedule-based
  planner uploads time-tagged command sequences during ground passes;
  the satellite executes with zero onboard autonomy between passes.
  Schedule is generated from freshly downlinked telemetry using a
  greedy battery-aware planner.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: centralized         # cen
decision_loop: sda                      # sda
representation: symbolic                # symb
emergence_mode: hand_designed           # hd
operations_paradigm: conventional_ground # cg

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_loop_config:
  sense_encode: true
  decide_act: true

representation_config:
  type: schedule_based_eventsat
  # --- Power system (from eventsat.yaml PDR Table 6.2) ---
  solar_generation_w: 24.0
  battery_capacity_wh: 84.0
  eclipse_fraction: 0.36
  step_duration_s: 60.0
  charge_efficiency: 0.9
  # --- Payload pipeline ---
  compression_time_factor: 2.0      # 2x observation time per compression
  detection_steps: 5                # 5 min CV inference = 5 steps at 60s
  observation_size_mb: 9.41
  compression_ratio: 5.11
  jetson_to_obc_rate_kbps: 50
  obc_capacity_mb: 512.0
  daily_downlink_budget_mb: 27.0
  # --- Planning parameters ---
  charge_reserve_fraction: 0.12     # Reserve last 12% of gap for pre-pass charging
  min_soc_for_operations: 0.40      # Don't operate payload below this SoC
  staleness_threshold: 5            # Steps of staleness before requesting fresh HK
  settling_time_steps: 2            # ADCS settling: floor(135s / 60s) = 2 steps
  # --- Power consumption per mode (PDR Table 6.2) ---
  power_consumption:
    charging:
      sun_w: 4.72
      eclipse_w: 4.32
    communication:
      sun_w: 33.65
      eclipse_w: 33.24
    payload_observe:
      sun_w: 17.94
      eclipse_w: 17.55
    payload_compress:
      sun_w: 12.77
      eclipse_w: 12.37
    payload_detect:
      sun_w: 12.77
      eclipse_w: 12.37
    payload_send:
      sun_w: 12.77
      eclipse_w: 12.37
    safe:
      sun_w: 9.58
      eclipse_w: 9.58

emergence_config:
  mode: hand_designed

operations_paradigm_config:
  default_mode: charging
  orbital_period_steps: 93          # 5554s / 60s ≈ 93 steps between passes

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60              # 1-minute resolution
  max_steps: 10080                  # 7 days = 7 * 24 * 60 = 10080 steps
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080                    # 7 days of 1-minute steps

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
