experiment_id: eventsat_sas_ah_rl_hllm-s
description: "EventSat \xB7 SAS \xB7 AH \xB7 rl onboard \xB7 hllm-s ground.\n"
seed: 42
agent_organization: sas
decision_procedure: sda
behaviour: emergent
operations_paradigm: autonomous_hybrid
agent_organization_config: {}
decision_procedure_config:
  sense_encode: true
  decide_act: true
behaviour_config:
  mechanism: ppo
  mode: emergent
  rollout_fragment: 128
  lr: 0.0001
  lr_schedule:
  - - 0
    - 0.0001
  - - 3000000
    - 1.0e-05
  gamma: 0.97
  gae_lambda: 0.95
  clip_ratio: 0.3
  ppo_epochs: 30
  entropy_coef: 0.01
  value_coef: 1.0
  max_grad_norm: 0.5
  minibatch_size: 256
operations_paradigm_config:
  orbital_period_steps: 93
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml
memory_config:
  history_depth: 100
num_episodes: 5
max_steps: 10080
metrics:
  enabled:
  - utility
  - latency
  - resource_efficiency
  - operator_load
  - explainability
  collection_frequency: per_step
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
onboard:
  representation: rl
  representation_config:
    rl_mock: false
    deterministic: false
    checkpoint_path: ''
    orbital_period_steps: 94
    max_steps: 10080
    compression_time_factor: 2.0
    detection_steps: 5
    jetson_capacity_mb: 249036.8
ground:
  representation: hllm-s
  representation_config:
    llm_provider: auto
    llm_model: qwen3.6:35b
    openai_model: gpt-4o-mini
    llm_temperature: 0.0
    llm_mock: false
    llm_cache_dir: data/llm_cache
