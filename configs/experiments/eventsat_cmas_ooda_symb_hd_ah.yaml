# EventSat | Hierarchical · OODA · Symbolic · Hand-designed · Autonomous-Hybrid
# ============================================================================
# 5D Morphological Matrix: cmas | ooda | symb | hd | ah
#
# Kim et al. (2025) [FVFQ73RF] Centralized MAS topology with Boyd OODA loop.
# Mission manager Orient phase builds situation assessment (CBR); sat_agent_0
# Orient phase refines with manager directive as prior. Compare with cen
# variant to isolate hierarchical org effect under OODA loop structure.

experiment_id: eventsat_cmas_ooda_symb_hd_ah
description: >
  EventSat hierarchical Centralized MAS with OODA loop, symbolic representation,
  and autonomous-hybrid ops. Mission manager Orient builds situation assessment;
  local agent Orient refines with directive context. Compare with
  eventsat_cen_ooda_symb_hd_ah (SAS) to isolate hierarchical organization effect.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: centralized_mas       # hier (Kim et al. 2025 Centralized MAS)
decision_procedure: ooda                    # ooda
representation: symbolic               # symb
behaviour: hand_designed          # hd
operations_paradigm: autonomous_hybrid # ah

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_procedure_config:
  orient_history_window: 10
  max_orient_iterations: 1
  urgency_bypass_threshold: 0.9

representation_config: {}

behaviour_config:
  mode: hand_designed

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
