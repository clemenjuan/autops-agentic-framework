# EventSat | Centralized · SDA · Subsymbolic · Learned · Autonomous-Hybrid
# ============================================================================
# 5D Morphological Matrix: sas | sda | subm | le | ah
#
# PPO-trained RL policy with SDA reactive loop and autonomous onboard ops.
# RLlib PPO selects operational modes from a 25D observation space. Symbolic
# grounding constraints prevent safety violations. Use rl_mock: true for
# CI/local testing without RLlib or a trained checkpoint.
#
# Papers:
#   Oliver et al. EUCASS 2025 (8KDZ5Z53): PPO hyperparameters, obs/action space
#   Hamilton et al. 2025 (GWQ3LK6H): observation space design, 10-seed eval
#   BSK-RL Stephenson & Schaub (ACUQK9VV): Gymnasium wrapper, lookahead features

experiment_id: eventsat_sas_sda_subm_le_ah
description: >
  EventSat RL subsymbolic representation with SDA loop and autonomous-hybrid ops.
  PPO policy trained separately through RLlib and evaluated from checkpoint.
  25D observation space with orbital lookahead features; MultiDiscrete([7,2,2]) action space.
  Baseline for subsymbolic representation comparison across loops and paradigms.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: sas        # cen
decision_loop: sda                     # sda
representation: subsymbolic            # subm
emergence_mode: learned                # le
operations_paradigm: autonomous_hybrid # ah

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_loop_config:
  sense_encode: true
  decide_act: true

representation_config:
  type: subsymbolic_eventsat
  rl_mock: false               # Set true for CI/local without RLlib checkpoint
  deterministic: true          # Deterministic checkpoint evaluation; RLlib handles training exploration
  checkpoint_path: ""          # Path to RLlib checkpoint (empty = auto/random fallback)
  # Env constants for observation normalisation
  orbital_period_steps: 94     # 5676s / 60s ≈ 94 steps
  max_steps: 10080
  compression_time_factor: 2.0
  detection_steps: 5           # 300s / 60s = 5 steps
  jetson_capacity_mb: 249036.8

emergence_config:
  mechanism: ppo
  mode: learned
  # PPO hyperparameters — Oliver et al. EUCASS 2025 (8KDZ5Z53)
  rollout_fragment: 128        # Steps collected per update (rollout_fragment)
  lr: 1.0e-4
  lr_schedule:
    - [0, 1.0e-4]
    - [3000000, 1.0e-5]
  gamma: 0.97                  # Discount factor (EUCASS: 0.966–0.98)
  gae_lambda: 0.95
  clip_ratio: 0.3              # Hamilton et al. 2025: clip=0.3
  ppo_epochs: 30               # EUCASS 2025: 30 SGD iterations per rollout
  entropy_coef: 0.01
  value_coef: 1.0
  max_grad_norm: 0.5
  minibatch_size: 256          # EUCASS 2025: minibatch_size=256
  policy_sharing:
    mode: shared_all           # shared_all | shared_by_role | independent_per_agent

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60            # 1-minute resolution
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 10               # Training episodes; use train_subsymbolic.py for full training
max_steps: 10080               # 7 days = 7 * 24 * 60 = 10080 steps

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
    - explainability
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
