# EventSat | Centralized · SDA · Symbolic · Hand-designed · Autonomous-Hybrid
# ============================================================================
# 5D Morphological Matrix: cen | sda | symb | hd | ah
#
# Autonomous onboard operations: the agent has real-time full-state visibility
# and can act every timestep. Rule-based priority chain decides mode each step.
#
# Use as the reference point for all EventSat comparisons.

experiment_id: eventsat_cen_sda_symb_hd_ah
description: >
  EventSat autonomous-hybrid baseline. Centralized rule-based agent with
  real-time state visibility and unrestricted action timing. Reactive
  priority rules manage mode transitions, observation scheduling, and
  power management over a 7-day mission.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: centralized        # cen
decision_loop: sda                     # sda
representation: symbolic               # symb
emergence_mode: hand_designed          # hd
operations_paradigm: autonomous_hybrid # ah

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_loop_config:
  sense_encode: true
  decide_act: true

representation_config:
  type: rule_based_eventsat

emergence_config:
  mode: hand_designed

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60            # 1-minute resolution
  max_steps: 10080                # 7 days = 7 * 24 * 60 = 10080 steps
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080                  # 7 days of 1-minute steps

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
