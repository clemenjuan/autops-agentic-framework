# EventSat | Hierarchical · SDA · Agentic · Hand-designed · Autonomous-Hybrid
# ============================================================================
# 5D Morphological Matrix: cmas | sda | hyag | lec | ah
#
# Kim et al. (2025) [FVFQ73RF] Centralized MAS topology with CoALA-style
# agentic hybrid representation. Mission manager runs multi-step tool reasoning
# to set directive; sat_agent_0 refines with local state + directive context.
# Both layers use the agentic representation — two levels of tool-augmented
# reasoning. Compare with cen variant to isolate hierarchical org effect.

experiment_id: eventsat_cmas_sda_hyag_lec_ah
description: >
  EventSat hierarchical Centralized MAS with SDA loop, agentic hybrid
  representation, and autonomous-hybrid ops. Mission manager produces
  CoALA-style tool-reasoned directives; local agent refines with directive
  context. Compare with eventsat_cen_sda_hyag_lec_ah (SAS) to isolate org effect.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: centralized_mas       # hier (Kim et al. 2025 Centralized MAS)
decision_procedure: sda                     # sda
representation: hybrid                 # hyag (agentic subtype of hybrid)
behaviour: emergent                 # lec
operations_paradigm: autonomous_hybrid # ah

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_procedure_config:
  sense_encode: true
  decide_act: true

representation_config:
  action_space: agentic
  llm_provider: auto
  llm_model: qwen3.5:122b
  openai_model: gpt-4o-mini
  llm_temperature: 0.0
  llm_mock: false
  llm_cache_dir: data/llm_cache
  max_agentic_steps: 3

behaviour_config:
  mode: emergent
  mechanism: writable_coala

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100
  memory_path: data/writable_memory_state/${experiment_id}/memory.json

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
    - explainability
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
