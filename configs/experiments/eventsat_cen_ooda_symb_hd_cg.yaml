# EventSat | Centralized · OODA · Symbolic · Hand-designed · Conventional-Ground
# ==============================================================================
# 5D Morphological Matrix: cen | ooda | symb | hd | cg
#
# Realistic human conventional ground operations with Boyd's OODA loop.
# A human flight dynamics team plans schedules between passes — NOT during
# the pass. The schedule uploaded at pass N was planned based on telemetry
# from pass N-1 (one-pass delay).
#
# Human cognitive constraints modelled (Sellmaier et al. 2022, ECSS-E-ST-70C,
# Endsley 1995):
#   - One-pass planning delay (paradigm level)
#   - Conservative charge duration margins (1.3x)
#   - Limited planning horizon (85% of gap planned; rest = charging buffer)
#   - Max 2 observations per gap (reduces cascade planning complexity)
#   - 10% shift handover probability with +10% min SoC safety margin
#
# Compare with:
#   - eventsat_cen_ooda_symb_hd_ag.yaml  (AG — same OODA, algorithmic scheduler)
#   - eventsat_cen_ooda_symb_hd_ah.yaml  (AH — same OODA, full onboard autonomy)

experiment_id: eventsat_cen_ooda_symb_hd_cg
description: >
  EventSat realistic human conventional ground operations with OODA loop.
  Human flight dynamics team plans schedules between passes with one-pass
  planning delay and cognitive constraints (conservative margins, limited
  horizon, shift handovers). Baseline for human-in-the-loop comparison.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: centralized         # cen
decision_loop: ooda                     # ooda
representation: symbolic                # symb
emergence_mode: hand_designed           # hd
operations_paradigm: conventional_ground # cg

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_loop_config:
  orient_history_window: 10
  max_orient_iterations: 1
  urgency_bypass_threshold: 0.9

representation_config:
  type: conventional_schedule_eventsat
  # --- Power system (from eventsat.yaml PDR Table 6.2) ---
  solar_generation_w: 24.0
  battery_capacity_wh: 84.0
  eclipse_fraction: 0.36
  step_duration_s: 60.0
  charge_efficiency: 0.9
  # --- Payload pipeline ---
  compression_time_factor: 2.0
  detection_steps: 5
  observation_size_mb: 9.41
  compression_ratio: 5.11
  jetson_to_obc_rate_kbps: 50
  obc_capacity_mb: 512.0
  daily_downlink_budget_mb: 27.0
  # --- Planning parameters ---
  charge_reserve_fraction: 0.12
  min_soc_for_operations: 0.40
  staleness_threshold: 5
  settling_time_steps: 2
  # --- Human cognitive constraint parameters ---
  # Sellmaier et al. (2022), ECSS-E-ST-70C, Endsley (1995)
  conservative_margin: 1.3          # 30% extra on charge durations (worst-case model)
  planning_horizon_discount: 0.85   # Plan 85% of gap; remaining 15% = charging buffer
  max_observations_per_gap: 2       # Human cognitive limit on cascade planning
  shift_handover_probability: 0.10  # 10% chance of context loss per planning cycle
  shift_handover_soc_penalty: 0.10  # +10% min SoC on handover (SA Level-3 degradation)
  # --- Power consumption per mode (PDR Table 6.2) ---
  power_consumption:
    charging:
      sun_w: 4.72
      eclipse_w: 4.32
    communication:
      sun_w: 33.65
      eclipse_w: 33.24
    payload_observe:
      sun_w: 17.94
      eclipse_w: 17.55
    payload_compress:
      sun_w: 12.77
      eclipse_w: 12.37
    payload_detect:
      sun_w: 12.77
      eclipse_w: 12.37
    payload_send:
      sun_w: 12.77
      eclipse_w: 12.37
    safe:
      sun_w: 9.58
      eclipse_w: 9.58

emergence_config:
  mode: hand_designed

operations_paradigm_config:
  default_mode: charging
  orbital_period_steps: 93          # 5554s / 60s ≈ 93 steps between passes

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080                  # 7 days
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
