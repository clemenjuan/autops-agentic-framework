# EventSat | SAS · SDA · Symbolic · Hand-designed · Conventional-Ground (ALGORITHMIC BASELINE)
# ==============================================================================
# 5D Morphological Matrix: sas | sda | symb | hd | cg   (extra: algorithmic scheduler)
#
# Research-probe variant of eventsat_sas_sda_symb_hd_cg.yaml.
# Uses the *algorithmic* schedule-based representation (schedule_based_eventsat)
# but keeps the conventional_ground operations paradigm (one-pass planning delay).
#
# Purpose: decouple two confounded effects that the paired baseline bundles:
#   (A) the one-pass planning delay imposed by ground operations
#   (B) human cognitive constraints (conservative margins, planning-horizon
#       discount, shift handovers, max-obs-per-gap limit)
#
# By holding representation constant with the AG baseline and only swapping
# ops paradigm CG <-> AG, we isolate effect (A) alone:
#   eventsat_sas_sda_symb_hd_ag.yaml          (schedule_based + AG)  --> no delay, no human
#   eventsat_sas_sda_symb_hd_cg_algobase.yaml (schedule_based + CG)  --> delay only  [THIS CONFIG]
#   eventsat_sas_sda_symb_hd_cg.yaml          (conv_schedule  + CG)  --> delay + human cognition
#
# References:
#   - Sellmaier et al. (2022), ECSS-E-ST-70C: ground operations delay
#   - Endsley (1995): human situation-awareness degradation (in the paired CG baseline only)

experiment_id: eventsat_sas_sda_symb_hd_cg_algobase
description: >
  Isolation-baseline for the CG operations paradigm. Uses the algorithmic
  schedule_based_eventsat representation (no human cognitive constraints)
  paired with conventional_ground ops (one-pass planning delay). Holds
  representation constant with the AG baseline so the AG <-> CG comparison
  isolates the planning-delay effect from human cognitive modelling.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: sas
decision_procedure: sda
representation: symbolic
behaviour: hand_designed
operations_paradigm: conventional_ground

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_procedure_config:
  sense_encode: true
  decide_act: true

representation_config:
  type: schedule_based_eventsat
  # --- Power system (from eventsat.yaml PDR Table 6.2) ---
  solar_generation_w: 24.0
  battery_capacity_wh: 84.0
  eclipse_fraction: 0.36
  step_duration_s: 60.0
  charge_efficiency: 0.9
  # --- Payload pipeline ---
  compression_time_factor: 2.0
  detection_steps: 5
  observation_size_mb: 9.41
  compression_ratio: 5.11
  jetson_to_obc_rate_kbps: 50
  obc_capacity_mb: 512.0
  daily_downlink_budget_mb: 27.0
  # --- Planning parameters (identical to the AG baseline) ---
  charge_reserve_fraction: 0.12
  min_soc_for_operations: 0.40
  staleness_threshold: 5
  settling_time_steps: 2
  # --- Power consumption per mode (PDR Table 6.2) ---
  power_consumption:
    charging:
      sun_w: 4.72
      eclipse_w: 4.32
    communication:
      sun_w: 33.65
      eclipse_w: 33.24
    payload_observe:
      sun_w: 17.94
      eclipse_w: 17.55
    payload_compress:
      sun_w: 12.77
      eclipse_w: 12.37
    payload_detect:
      sun_w: 12.77
      eclipse_w: 12.37
    payload_send:
      sun_w: 12.77
      eclipse_w: 12.37
    safe:
      sun_w: 9.58
      eclipse_w: 9.58

behaviour_config:
  mode: hand_designed

operations_paradigm_config:
  default_mode: charging
  orbital_period_steps: 93

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
