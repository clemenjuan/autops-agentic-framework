# EventSat | Centralized · OODA · Symbolic · Hand-designed · Autonomous-Hybrid
# ============================================================================
# 5D Morphological Matrix: sas | ooda | symb | hd | ah
#
# Boyd's OODA loop (1987) with METIS-inspired situation classification in
# Observe and simplified Case-Based Reasoning in Orient. The agent has
# real-time full-state visibility and can act every timestep.
#
# Literature basis:
#   - Miller et al. (2021), ASCEND — OODA loop structure & gamma-distributed TPM
#   - Hartmann et al. (2024), IEEE Aerospace — METIS OODA-to-agents mapping
#   - Richards (2020), Necesse — Boyd's OODA Loop
#
# Compare with eventsat_sas_sda_symb_hd_ah.yaml (SDA baseline) to measure:
#   - Orient phase overhead (orient_latency_s)
#   - Memory interaction patterns (CBR retrieve/retain)
#   - Situation classification quality (orient_situation_class, orient_urgency)
#   - OODA loop duration as gamma-distributed TPM

experiment_id: eventsat_sas_ooda_symb_hd_ah
description: >
  EventSat OODA loop with autonomous-hybrid operations. Centralized rule-based
  agent with Orient phase that builds situation assessments via Case-Based
  Reasoning from memory history before deciding. Compare with SDA baseline
  to measure orient overhead, memory interaction, and situation assessment quality.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: sas        # cen
decision_loop: ooda                    # ooda
representation: symbolic               # symb
emergence_mode: hand_designed          # hd
operations_paradigm: autonomous_hybrid # ah

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_loop_config:
  orient_history_window: 10            # Past states for CBR retrieve
  max_orient_iterations: 1             # Boyd's feedback loop (re-orient if ambiguous)
  urgency_bypass_threshold: 0.9        # Orient→Act bypass for critical situations

representation_config:
  type: rule_based_eventsat

emergence_config:
  mode: hand_designed

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60            # 1-minute resolution
  max_steps: 10080                # 7 days = 7 * 24 * 60 = 10080 steps
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080                  # 7 days of 1-minute steps

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
