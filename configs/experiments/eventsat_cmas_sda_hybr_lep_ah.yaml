# EventSat | Hierarchical · SDA · LLM-Hybrid · Hand-designed · Autonomous-Hybrid
# ============================================================================
# 5D Morphological Matrix: cmas | sda | hybr | lep | ah
#
# Kim et al. (2025) [FVFQ73RF] Centralized MAS topology with LLM hybrid representation.
# Mission manager reasons with LLM about strategic scheduling; sat_agent_0
# refines with local state + manager directive. Both share the llm_eventsat
# representation. Compare with cen variant to isolate hierarchical org effect.

experiment_id: eventsat_cmas_sda_hybr_lep_ah
description: >
  EventSat hierarchical Centralized MAS with SDA loop, LLM hybrid representation,
  and autonomous-hybrid ops. Mission manager sets LLM-reasoned strategic directives;
  local agent executes with directive as message context. Compare with
  eventsat_cen_sda_hybr_lep_ah (SAS) to isolate hierarchical organization effect.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: centralized_mas       # hier (Kim et al. 2025 Centralized MAS)
decision_loop: sda                     # sda
representation: hybrid                 # hybr
emergence_mode: learned                 # lep
operations_paradigm: autonomous_hybrid # ah

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_loop_config:
  sense_encode: true
  decide_act: true

representation_config:
  type: llm_eventsat
  llm_provider: auto
  llm_model: qwen3.5:122b
  openai_model: gpt-4o-mini
  llm_temperature: 0.0
  llm_mock: false
  llm_cache_dir: data/llm_cache

emergence_config:
  mode: learned
  mechanism: prompt_optimized

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
    - explainability
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
