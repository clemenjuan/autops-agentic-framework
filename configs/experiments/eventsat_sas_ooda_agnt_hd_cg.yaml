# EventSat | Centralized - OODA - Agentic Hybrid - Hand-designed - Conventional-Ground
# ============================================================================
# 5D Morphological Matrix: sas | ooda | agnt | hd | cg
#
# CoALA-style agentic hybrid representation with OODA loop and conventional-ground ops.
# Multi-step reasoning with domain tools (battery, pass, pipeline, constraints,
# history, plan evaluation). Compare with single-shot LLM (hybr_hd) and
# symbolic baseline (symb_hd).
#
# Papers: Sumers et al. (2024) [CoALA], Sapkota et al. (2026), Li (2025)

experiment_id: eventsat_sas_ooda_agnt_hd_cg
description: >
  EventSat agentic hybrid representation with OODA loop and conventional-ground ops.
  CoALA-style multi-step reasoning with structured tool use. Compare with
  single-shot LLM (hybr_hd) and symbolic (symb_hd) baselines.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: sas        # cen
decision_loop: ooda                  # ooda
representation: hybrid                 # agnt (agentic subtype of hybrid)
emergence_mode: hand_designed          # hd
operations_paradigm: conventional_ground       # cg

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_loop_config:
  max_iterations: 3
  threshold: 0.5

representation_config:
  type: agentic_scheduler_eventsat
  llm_provider: auto
  llm_model: qwen3.5:122b
  openai_model: gpt-4o-mini
  llm_temperature: 0.0
  llm_mock: false
  llm_cache_dir: data/llm_cache
  max_agentic_steps: 3

emergence_config:
  mode: hand_designed

operations_paradigm_config:
  orbital_period_steps: 93

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
    - explainability
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
