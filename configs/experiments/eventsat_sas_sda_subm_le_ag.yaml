# EventSat | Centralized · SDA · Subsymbolic · Learned · Autonomous-Ground
# ============================================================================
# 5D Morphological Matrix: sas | sda | subm | le | ag

experiment_id: eventsat_sas_sda_subm_le_ag
description: >
  EventSat RL subsymbolic representation with SDA loop and autonomous-ground ops.
  Ground station receives downlinked telemetry each pass; agent runs autonomously
  between passes. PPO ActorCritic with 25D observation space.

seed: 42

agent_organization: sas
decision_procedure: sda
representation: subsymbolic
behaviour: emergent
operations_paradigm: autonomous_ground

agent_organization_config: {}

decision_procedure_config:
  sense_encode: true
  decide_act: true

representation_config:
  type: subsymbolic_scheduler_eventsat
  rl_mock: false
  deterministic: false
  checkpoint_path: ""
  orbital_period_steps: 94
  max_steps: 10080
  compression_time_factor: 2.0
  detection_steps: 5
  jetson_capacity_mb: 249036.8

behaviour_config:
  mechanism: ppo
  mode: emergent
  rollout_fragment: 128
  lr: 1.0e-4
  lr_schedule:
    - [0, 1.0e-4]
    - [3000000, 1.0e-5]
  gamma: 0.97
  gae_lambda: 0.95
  clip_ratio: 0.3
  ppo_epochs: 30
  entropy_coef: 0.01
  value_coef: 1.0
  max_grad_norm: 0.5
  minibatch_size: 256

operations_paradigm_config:
  orbital_period_steps: 93    # Required for ground ops paradigm

environment:
  constellation_size: 1
  timestep_seconds: 60
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

memory_config:
  history_depth: 100

num_episodes: 10
max_steps: 10080

metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
    - explainability
  collection_frequency: per_step

output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
