# EventSat | Centralized · ReAct · Symbolic · Hand-designed · Autonomous-Hybrid
# ==============================================================================
# 5D Morphological Matrix: sas | react | symb | hd | ah
#
# ReAct loop (Yao et al. 2023) with rule-based representation and full
# onboard autonomy. The Thought-Action-Observation cycle adds explicit
# reasoning traces and iterative constraint validation on top of the
# rule-based decision logic.
#
# Literature basis:
#   - Yao et al. (2023) "ReAct: Synergizing Reasoning and Acting" [R8AVHEAP]
#   - Li (2025) "AI Agents for Satellite Operations" [UAA3GIVK]
#
# Compare with:
#   - eventsat_sas_sda_symb_hd_ah.yaml   (SDA — same repr/ops, no reasoning)
#   - eventsat_sas_ooda_symb_hd_ah.yaml  (OODA — same repr/ops, 4-phase loop)

experiment_id: eventsat_sas_react_symb_hd_ah
description: >
  EventSat ReAct loop with rule-based symbolic representation and full
  onboard autonomous hybrid operations. Iterative Thought-Action-Observation
  cycle validates each action proposal against battery and pass-window
  constraints before executing. Converges to charging if max iterations fail.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: sas         # cen
decision_procedure: react                    # react
representation: symbolic                # symb
behaviour: hand_designed           # hd
operations_paradigm: autonomous_hybrid  # ah

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_procedure_config:
  max_iterations: 3              # Max Thought-Action-Observation cycles
  grounding_checks:              # Constraints validated after each action
    - battery_feasibility        # SoC >= 0.30 for energy-intensive modes
    - pass_window_timing         # communication only during ground passes

representation_config: {}

behaviour_config:
  mode: hand_designed

operations_paradigm_config:
  default_mode: charging

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080                  # 7 days
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
