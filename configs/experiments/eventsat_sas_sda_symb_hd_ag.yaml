# EventSat | Centralized · SDA · Symbolic · Hand-designed · Autonomous-Ground
# ==============================================================================
# 5D Morphological Matrix: sas | sda | symb | hd | ag
#
# Autonomous ground operations: an algorithmic scheduler generates optimal
# time-tagged schedules instantly during ground passes (no planning latency).
# The satellite has ZERO onboard autonomy between passes.
#
# Renamed from eventsat_sas_sda_symb_hd_cg (conventional_ground → autonomous_ground)
# to clarify that the original implementation modelled an ideal algorithmic
# scheduler, not realistic human ground operations.
#
# Compare with:
#   - eventsat_sas_sda_symb_hd_ah.yaml  (AH — same loop, full onboard autonomy)
#   - eventsat_sas_sda_symb_hd_cg.yaml  (CG — realistic human ops, one-pass delay)

experiment_id: eventsat_sas_sda_symb_hd_ag
description: >
  EventSat autonomous ground operations. Algorithmic schedule-based planner
  generates optimal time-tagged command sequences instantly during ground
  passes; the satellite executes with zero onboard autonomy between passes.
  No human planning delay or cognitive constraints.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: sas         # cen
decision_loop: sda                      # sda
representation: symbolic                # symb
emergence_mode: hand_designed           # hd
operations_paradigm: autonomous_ground  # ag

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_loop_config:
  sense_encode: true
  decide_act: true

representation_config:
  type: schedule_based_eventsat
  # --- Power system (from eventsat.yaml PDR Table 6.2) ---
  solar_generation_w: 24.0
  battery_capacity_wh: 84.0
  eclipse_fraction: 0.36
  step_duration_s: 60.0
  charge_efficiency: 0.9
  # --- Payload pipeline ---
  compression_time_factor: 2.0      # 2x observation time per compression
  detection_steps: 5                # 5 min CV inference = 5 steps at 60s
  observation_size_mb: 9.41
  compression_ratio: 5.11
  jetson_to_obc_rate_kbps: 50
  obc_capacity_mb: 512.0
  daily_downlink_budget_mb: 27.0
  # --- Planning parameters ---
  charge_reserve_fraction: 0.12     # Reserve last 12% of gap for pre-pass charging
  min_soc_for_operations: 0.40      # Don't operate payload below this SoC
  staleness_threshold: 5            # Steps of staleness before requesting fresh HK
  settling_time_steps: 2            # ADCS settling: floor(135s / 60s) = 2 steps
  # --- Power consumption per mode (PDR Table 6.2) ---
  power_consumption:
    charging:
      sun_w: 4.72
      eclipse_w: 4.32
    communication:
      sun_w: 33.65
      eclipse_w: 33.24
    payload_observe:
      sun_w: 17.94
      eclipse_w: 17.55
    payload_compress:
      sun_w: 12.77
      eclipse_w: 12.37
    payload_detect:
      sun_w: 12.77
      eclipse_w: 12.37
    payload_send:
      sun_w: 12.77
      eclipse_w: 12.37
    safe:
      sun_w: 9.58
      eclipse_w: 9.58

emergence_config:
  mode: hand_designed

operations_paradigm_config:
  default_mode: charging
  orbital_period_steps: 93          # 5554s / 60s ≈ 93 steps between passes

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60              # 1-minute resolution
  max_steps: 10080                  # 7 days = 7 * 24 * 60 = 10080 steps
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080                    # 7 days of 1-minute steps

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
