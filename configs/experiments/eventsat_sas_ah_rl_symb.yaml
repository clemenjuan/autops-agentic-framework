experiment_id: eventsat_sas_ah_rl_symb
description: "EventSat \xB7 SAS \xB7 AH \xB7 rl onboard \xB7 symb ground.\n"
seed: 42
agent_organization: sas
decision_procedure: sda
behaviour: emergent
operations_paradigm: autonomous_hybrid
agent_organization_config: {}
decision_procedure_config:
  sense_encode: true
  decide_act: true
# Dual-core AH: RL (PPO) onboard core + symbolic ground planner. The ppo
# mechanism trains the onboard core; the symbolic ground planner is hand-designed.
onboard:
  representation: rl
  representation_config:
    rl_mock: false
    deterministic: false
    checkpoint_path: ''
    orbital_period_steps: 94
    max_steps: 10080
    compression_time_factor: 2.0
    detection_steps: 5
    jetson_capacity_mb: 249036.8
ground:
  representation: symb
  representation_config: {}
behaviour_config:
  mechanism: ppo
  mode: emergent
  rollout_fragment: 128
  lr: 0.0001
  lr_schedule:
  - - 0
    - 0.0001
  - - 3000000
    - 1.0e-05
  gamma: 0.97
  gae_lambda: 0.95
  clip_ratio: 0.3
  ppo_epochs: 30
  entropy_coef: 0.01
  value_coef: 1.0
  max_grad_norm: 0.5
  minibatch_size: 256
environment:
  constellation_size: 1
  timestep_seconds: 60
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml
memory_config:
  history_depth: 100
num_episodes: 10
max_steps: 10080
metrics:
  enabled:
  - utility
  - latency
  - resource_efficiency
  - operator_load
  - explainability
  collection_frequency: per_step
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
