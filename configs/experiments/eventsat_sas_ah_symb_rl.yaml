experiment_id: eventsat_sas_ah_symb_rl
description: "EventSat \xB7 SAS \xB7 AH \xB7 symb onboard \xB7 rl ground.\n"
seed: 42
agent_organization: sas
decision_procedure: sda
behaviour: hand_designed
operations_paradigm: autonomous_hybrid
agent_organization_config: {}
decision_procedure_config:
  sense_encode: true
  decide_act: true
behaviour_config:
  mode: hand_designed
operations_paradigm_config:
  orbital_period_steps: 93
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml
memory_config:
  history_depth: 100
num_episodes: 5
max_steps: 10080
metrics:
  enabled:
  - utility
  - latency
  - resource_efficiency
  - operator_load
  - explainability
  collection_frequency: per_step
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
onboard:
  representation: symb
  representation_config: {}
ground:
  representation: rl
  representation_config:
    rl_mock: false
    deterministic: false
    checkpoint_path: ''
    orbital_period_steps: 94
    max_steps: 10080
    compression_time_factor: 2.0
    detection_steps: 5
    jetson_capacity_mb: 249036.8
