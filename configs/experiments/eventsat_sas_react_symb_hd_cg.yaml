# EventSat | Centralized · ReAct · Symbolic · Hand-designed · Conventional-Ground
# ==============================================================================
# 5D Morphological Matrix: sas | react | symb | hd | cg
#
# ReAct loop with human-modeled schedule representation and conventional
# ground ops (one-pass planning delay, human cognitive constraints).
# The ReAct grounding layer adds constraint validation on top of the
# already-degraded human schedule quality.
#
# Literature basis:
#   - Yao et al. (2023) "ReAct: Synergizing Reasoning and Acting" [R8AVHEAP]
#   - Li (2025) "AI Agents for Satellite Operations" [UAA3GIVK]
#   - Sellmaier et al. (2022) "Spacecraft Operations" [SGJTLF4D]
#   - Endsley (1995) "Situation Awareness in Dynamic Systems" [46MUS93H]
#
# Compare with:
#   - eventsat_sas_react_symb_hd_ag.yaml (AG — same loop, algorithmic ops)
#   - eventsat_sas_sda_symb_hd_cg.yaml   (SDA — same repr/ops, no reasoning)

experiment_id: eventsat_sas_react_symb_hd_cg
description: >
  EventSat ReAct loop with human-modeled schedule representation and
  conventional ground operations. Combines one-pass planning delay,
  human cognitive constraints, and ReAct grounding validation.

seed: 42

# -- Morphological Matrix (5 dimensions) -----------------------------------
agent_organization: sas         # cen
decision_procedure: react                    # react
representation: symbolic                # symb
behaviour: hand_designed           # hd
operations_paradigm: conventional_ground # cg

# -- Component Configs -----------------------------------------------------
agent_organization_config: {}

decision_procedure_config:
  max_iterations: 3
  grounding_checks:
    - battery_feasibility
    - pass_window_timing

representation_config:
  type: conventional_schedule_eventsat
  # --- Power system (from eventsat.yaml PDR Table 6.2) ---
  solar_generation_w: 24.0
  battery_capacity_wh: 84.0
  eclipse_fraction: 0.36
  step_duration_s: 60.0
  charge_efficiency: 0.9
  # --- Payload pipeline ---
  compression_time_factor: 2.0
  detection_steps: 5
  observation_size_mb: 9.41
  compression_ratio: 5.11
  jetson_to_obc_rate_kbps: 50
  obc_capacity_mb: 512.0
  daily_downlink_budget_mb: 27.0
  # --- Planning parameters ---
  charge_reserve_fraction: 0.12
  min_soc_for_operations: 0.40
  staleness_threshold: 5
  settling_time_steps: 2
  # --- Human cognitive constraint parameters ---
  conservative_margin: 1.3
  planning_horizon_discount: 0.85
  max_observations_per_gap: 2
  shift_handover_probability: 0.10
  shift_handover_soc_penalty: 0.10
  # --- Power consumption per mode (PDR Table 6.2) ---
  power_consumption:
    charging:
      sun_w: 4.72
      eclipse_w: 4.32
    communication:
      sun_w: 33.65
      eclipse_w: 33.24
    payload_observe:
      sun_w: 17.94
      eclipse_w: 17.55
    payload_compress:
      sun_w: 12.77
      eclipse_w: 12.37
    payload_detect:
      sun_w: 12.77
      eclipse_w: 12.37
    payload_send:
      sun_w: 12.77
      eclipse_w: 12.37
    safe:
      sun_w: 9.58
      eclipse_w: 9.58

behaviour_config:
  mode: hand_designed

operations_paradigm_config:
  default_mode: charging
  orbital_period_steps: 93

# -- Environment -----------------------------------------------------------
environment:
  constellation_size: 1
  timestep_seconds: 60
  max_steps: 10080                  # 7 days
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

# -- Memory ----------------------------------------------------------------
memory_config:
  history_depth: 100

# -- Execution -------------------------------------------------------------
num_episodes: 5
max_steps: 10080

# -- Metrics ---------------------------------------------------------------
metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
  collection_frequency: per_step

# -- Output ----------------------------------------------------------------
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
