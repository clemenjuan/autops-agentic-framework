# EventSat | Centralized · OODA · Subsymbolic · Learned · Autonomous-Hybrid
# ============================================================================
# 5D Morphological Matrix: sas | ooda | subm | le | ah

experiment_id: eventsat_sas_ooda_subm_le_ah
description: >
  EventSat RL subsymbolic representation with OODA loop and autonomous-hybrid ops.
  PPO ActorCritic with 25D observation space and OODA Observe-Orient-Decide-Act
  loop. OODA's orient phase enriches context with trend analysis before the RL
  policy selects an action.

seed: 42

agent_organization: sas
decision_procedure: ooda
representation: subsymbolic
behaviour: emergent
operations_paradigm: autonomous_hybrid

agent_organization_config: {}

decision_procedure_config:
  observe: true
  orient: true
  decide: true
  act: true

representation_config:
  type: subsymbolic_eventsat
  rl_mock: false
  deterministic: false
  checkpoint_path: ""
  orbital_period_steps: 94
  max_steps: 10080
  compression_time_factor: 2.0
  detection_steps: 5
  jetson_capacity_mb: 249036.8

behaviour_config:
  mechanism: ppo
  mode: emergent
  rollout_fragment: 128
  lr: 1.0e-4
  lr_schedule:
    - [0, 1.0e-4]
    - [3000000, 1.0e-5]
  gamma: 0.97
  gae_lambda: 0.95
  clip_ratio: 0.3
  ppo_epochs: 30
  entropy_coef: 0.01
  value_coef: 1.0
  max_grad_norm: 0.5
  minibatch_size: 256

environment:
  constellation_size: 1
  timestep_seconds: 60
  scenario: eventsat
  scenario_config:
    scenario_file: configs/scenarios/eventsat.yaml

memory_config:
  history_depth: 100

num_episodes: 10
max_steps: 10080

metrics:
  enabled:
    - utility
    - latency
    - resource_efficiency
    - operator_load
    - explainability
  collection_frequency: per_step

output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
