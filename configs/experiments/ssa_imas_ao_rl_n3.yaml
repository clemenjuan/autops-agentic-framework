experiment_id: ssa_imas_ao_rl_n3
description: SSA AO rl backbone config for IMAS at N=3.
seed: 42
agent_organization: independent_mas
decision_procedure: sda
representation: rl
behaviour: emergent
operations_paradigm: autonomous_onboard
agent_organization_config:
  satellite_prefix: sat
decision_procedure_config:
  sense_encode: true
  decide_act: true
representation_config:
  type: subsymbolic_eventsat
  rl_mock: true
  deterministic: true
  checkpoint_path: ''
  satellite_id: sat_0
  orbital_period_steps: 94
  max_steps: 10080
  compression_time_factor: 2.0
  detection_steps: 5
  jetson_capacity_mb: 249036.8
behaviour_config:
  mechanism: ppo
  mode: emergent
  rollout_fragment: 128
  lr: 0.0001
  gamma: 0.97
  gae_lambda: 0.95
  clip_ratio: 0.3
  ppo_epochs: 30
  entropy_coef: 0.01
  value_coef: 1.0
  max_grad_norm: 0.5
  minibatch_size: 256
  policy_sharing:
    mode: shared_all
operations_paradigm_config:
  default_mode: charging
environment:
  constellation_size: 3
  timestep_seconds: 60
  max_steps: 10080
  scenario: ssa
  scenario_config:
    scenario_file: configs/scenarios/ssa.yaml
    reward_config:
      local_weight: 0.7
      team_weight: 0.3
      team_reducer: mean
      collective_weight: 1.0
      mission_scale: 1.0
      collective_negative: true
memory_config:
  history_depth: 100
num_episodes: 1
max_steps: 100
metrics:
  enabled:
  - utility
  - latency
  - resource_efficiency
  - operator_load
  - explainability
  - scale_complexity
  - ssa_coverage
  - ssa_duplicates
  - ssa_connectivity
  collection_frequency: per_step
  baseline_utility_n1: 1.0
output_dir: data/results/${experiment_id}
save_checkpoints: false
log_level: INFO
