# MultiEventsat Scenario Definition
# ================================
# A Multi-EventSat constellation scenario, inspired by
# EventSat. Each satellite runs full EventSat dynamics (power, 3-pool data
# pipeline, comms, anomalies) with an INDEPENDENT launch lottery, so the
# constellation has distinct eclipse/pass geometry per satellite.
#
# This file defines the per-satellite physical parameters. The number of
# satellites (constellation_size) is set in the experiment YAML, not here.
# The physics intentionally reuses the EventSat 6U CubeSat model so the RL
# observation/action contract (25D / MultiDiscrete([7,2,2])) is shared.

scenario_name: multieventsat
scenario_version: "1.0"
description: >
  Multi-EventSat constellation: N independent EventSat-class 6U CubeSats
  in SSO, each with its own launch lottery. Satellites are fully decoupled in
  v1 (no shared ground-station budget, no inter-satellite links); coordination
  pressure, if desired, is introduced through the reward team term.

# -- Orbit (per satellite) -----------------------------------------------
orbit:
  type: SSO
  altitude_km: 400
  inclination_deg: 97.4
  eccentricity: 0.001
  raan_deg: 0.0                   # Overridden per episode/satellite by launch_lottery
  arg_perigee_deg: 0.0            # Overridden per episode/satellite by launch_lottery
  orbital_period_s: 5554
  eclipse_fraction: 0.36
  propagator: j2
  launch_lottery: true            # Independent RAAN/ArgP/TA per satellite

# -- Power System ---------------------------------------------------------
power:
  solar_panels:
    config: "2x6U + 2x3U body-mounted"
    generation_peak_w: 24.0
    panel_efficiency_factor: 0.70
  battery:
    count: 2
    capacity_wh: 84.0
    initial_soc: 0.8
    min_soc: 0.2
    max_soc: 1.0
    charge_efficiency: 0.9
  consumption:
    charging:        {sun_w: 4.72,  eclipse_w: 4.32}
    communication:   {sun_w: 33.65, eclipse_w: 33.24}
    payload_observe: {sun_w: 17.94, eclipse_w: 17.55}
    payload_compress: {sun_w: 12.77, eclipse_w: 12.37}
    payload_detect:  {sun_w: 12.77, eclipse_w: 12.37}
    payload_send:    {sun_w: 12.77, eclipse_w: 12.37}
    safe:            {sun_w: 9.58,  eclipse_w: 9.58}
    detumbling:      {sun_w: 2.66,  eclipse_w: 2.33}

# -- Communications -------------------------------------------------------
communications:
  sband:
    downlink_rate_kbps: 128
    uplink_rate_kbps: 128
  ground_station:
    name: "Ottobrunn"
    latitude_deg: 48.0483
    longitude_deg: 11.6567
    min_elevation_deg: 10.0
  passes:
    min_per_day: 2
    max_per_day: 3
    min_duration_s: 22
    max_duration_s: 422
    avg_data_per_day_mb: 12.0
    daily_downlink_budget_mb: 27.0

# -- Data Storage ----------------------------------------------------------
storage:
  obc_capacity_mb: 4096
  jetson_capacity_mb: 249036.8
  observation_size_mb: 9.41
  compression_ratio: 5.11
  jetson_to_obc_rate_kbps: 50

# -- Payload ---------------------------------------------------------------
payload:
  observation_duration_s: 60
  compression_time_factor: 2.0
  detection_time_s: 300
  calibration_duration_s: 120

# -- Operational Modes -----------------------------------------------------
modes:
  available:
    - charging
    - communication
    - payload_observe
    - payload_compress
    - payload_detect
    - payload_send
    - safe
  default: charging
  constraints:
    communication:
      requires_ground_pass: true
      requires_fine_pointing: true
    payload_observe:
      requires_eclipse: false
      min_battery_soc: 0.4
    payload_compress: {min_battery_soc: 0.3}
    payload_detect:   {min_battery_soc: 0.3}
    payload_send:     {min_battery_soc: 0.3}
  transition_overhead:
    settling_time_s: 135.0
    attitude_maneuver_modes:
      - payload_observe
      - communication

# -- Reward Function (per satellite, Individual Negative; team term in config)
rewards:
  reward_scale: 0.01
  resource_penalty_factor: 1.0
  battery_low_threshold: 0.3
  storage_high_threshold: 0.8
  standby_penalty: 0.05
  safe_penalty: 0.3
  observe_reward: 1.0
  compress_reward: 0.5
  failed_action_penalty: 0.1
  comm_reward_factor: 1.0
  comm_reward_cap: 5.0
  mission_scale: 1.0

# -- Mission Objectives (per satellite) -----------------------------------
objectives:
  total_observation_hours: 2.0
  min_downlinked_data_mb: 221
  mission_duration_days: 90
  observations_per_day_target: 4
