# Flamingo-lite Scenario Definition
# =================================
#
# Minimal multi-satellite SSA scenario for opening the Organisation axis.
# This is intentionally coarse: it models target visibility and coordination
# pressure before adding mission-partner fidelity.

scenario_name: flamingo
scenario_version: "0.1"
description: >
  Lightweight SSA tracking scenario for a small constellation. Satellites select
  RSO targets from time-varying visibility windows; duplicate or infeasible
  assignments expose coordination costs.

constellation_size: 3
max_steps: 1440
visibility_period_steps: 12
visibility_window_steps: 3
# satellite_phase_shift: 0 makes the whole constellation see the same RSO windows
# at the same time, so satellites must compete for the few visible high-priority
# targets. This is what makes the organisation axis bite: a coordinated org
# spreads its satellites across the visible targets, while an uncoordinated one
# piles onto the single highest-priority RSO and wastes capacity on duplicates.
satellite_phase_shift: 0
observation_data_mb: 1.0

# stochastic: true draws a fresh RSO catalog each episode from the per-episode
# seed (runner uses config.seed + episode_id), so repeated episodes form a real
# distribution and organisation comparisons get error bars. Paired seeds hand
# every organisation the same catalog per episode → fair within-instance contrast.
stochastic: true

# Skewed priorities give a clearly contested top target. With three satellites
# all seeing the same ~3-target window, a global planner books the top three
# priorities (no waste) while independent agents all grab the single best one.
# In stochastic mode each target's priority is sampled from this set and its
# visibility phase is drawn uniformly, varying the instance episode to episode.
targets:
  count: 8
  priorities: [5.0, 3.0, 2.0, 1.0]

