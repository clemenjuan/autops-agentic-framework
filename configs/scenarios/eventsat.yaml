# EventSat Scenario Definition
# ============================
# Source: EventSat PDR (TUM Chair of Spacecraft Systems, Nov 2025)
#
# This file defines the physical parameters and operational constraints
# for the EventSat 6U CubeSat. It is loaded by the EventSatEnvironment
# and can be referenced by any experiment YAML via scenario_config.
#
# Design intent: keep scenario parameters separate from experiment config
# so the same scenario feeds multiple architecture experiments.

scenario_name: eventsat
scenario_version: "1.0"
description: >
  EventSat 6U CubeSat technology demonstration mission for space-based
  event camera observation. Single satellite, SSO orbit, TUM mission.

# -- Orbit ---------------------------------------------------------------
orbit:
  type: SSO                       # Sun-synchronous orbit
  altitude_km: 400                # Proposal Section 13: below 415 km preferred
  inclination_deg: 97.4           # PDR Section 1.1
  eccentricity: 0.001             # Near-circular (explicit for J2 propagator)
  raan_deg: 0.0                   # Overridden per episode by launch_lottery
  arg_perigee_deg: 0.0            # Overridden per episode by launch_lottery
  orbital_period_s: 5554          # ~92.6 min at 400 km (T = 2π√((R_E+h)³/μ))
  eclipse_fraction: 0.36          # ~34 min eclipse / 94.6 min orbit
  propagator: j2                  # EcksteinHechler J2; 'keplerian' for two-body only
  launch_lottery: true            # Randomize RAAN/ArgP/TA per episode (rideshare)

# -- Satellite Physical Parameters ----------------------------------------
satellite:
  form_factor: "6U"
  mass_kg: 6.789                  # PDR Table 6.1 (without contingency)
  mass_with_contingency_kg: 7.646 # PDR Table 6.1
  max_mass_kg: 7.980              # Deployer limit

# -- Power System ----------------------------------------------------------
# PDR Table 6.2: Power consumption per mode (Watts)
power:
  solar_panels:
    config: "2x6U + 2x3U body-mounted"
    generation_peak_w: 24.0       # Peak output at normal incidence (all panels perfectly
                                  # sun-facing). Derived from panel area × solar irradiance
                                  # (~1361 W/m²) × cell efficiency. This is an upper bound
                                  # that is never achieved in practice.
    panel_efficiency_factor: 0.70 # Average cosine incidence factor over a sunlit pass.
                                  # The 2x3U body-mounted panels are fixed to the nadir face
                                  # and are sub-optimal whenever the sun is not directly
                                  # behind the satellite. The 2x6U deployable panels can
                                  # rotate but still lose ~10-15% to off-axis incidence
                                  # over an orbit. Combined effective factor ≈ 0.65–0.80;
                                  # 0.70 is a conservative mid-range estimate.
                                  # Effective generation = generation_peak_w × this factor
                                  # → 24.0 × 0.70 = 16.8 W average during sunlit passes.
  battery:
    count: 2
    capacity_wh: 84.0             # Combined capacity 2 x 42 Wh
    initial_soc: 0.8              # State of charge at episode start
    min_soc: 0.2                  # Minimum safe SoC
    max_soc: 1.0
    charge_efficiency: 0.9

  # Onboard-compute (Jetson) power overhead (Watts). A Jetson-based onboard core
  # (subsymbolic / hybrid onboard, paradigms AO/AH) keeps the Jetson powered (~7 W;
  # inference itself is microseconds → no compute energy). ADDED to modes where the
  # Jetson would otherwise be off (charging, communication, observe, safe), but NOT to
  # the Jetson-compute modes below (their per-mode figure already includes the working
  # Jetson). Symbolic onboard runs on the OBC (sub-watt) → no overhead; ground
  # paradigms (AG/CG) → no overhead.
  onboard_compute_w: 7.0
  # Modes whose consumption already includes the working Jetson (no overhead added).
  jetson_active_modes: [payload_compress, payload_detect, payload_send]

  # Consumption by mode (total Watts from PDR Table 6.2)
  consumption:
    charging:
      sun_w: 4.72
      eclipse_w: 4.32
    communication:
      sun_w: 33.65
      eclipse_w: 33.24
    payload_observe:
      sun_w: 17.94
      eclipse_w: 17.55
    payload_compress:
      sun_w: 12.77
      eclipse_w: 12.37
    payload_detect:
      sun_w: 12.77                # Same as compress — Jetson CV inference workload
      eclipse_w: 12.37
    payload_send:
      sun_w: 12.77                # Jetson on for RS-485 TX; adjust when measured
      eclipse_w: 12.37
    safe:
      sun_w: 9.58
      eclipse_w: 9.58
    detumbling:
      sun_w: 2.66
      eclipse_w: 2.33

# -- Communications -------------------------------------------------------
# PDR Section 6.2
communications:
  sband:
    downlink_rate_kbps: 128       # Conservative estimate
    uplink_rate_kbps: 128
  uhf:
    downlink_rate_kbps: 9.6
    uplink_rate_kbps: 9.6
  ground_station:
    name: "Ottobrunn"
    latitude_deg: 48.0483
    longitude_deg: 11.6567
    min_elevation_deg: 10.0        # Minimum elevation for S-band visibility
  passes:
    min_per_day: 2
    max_per_day: 3
    min_duration_s: 22             # PDR Table 6.4
    max_duration_s: 422            # PDR Table 6.4
    avg_data_per_day_mb: 12.0      # Between 9.25 and 15.54 MB/day (Ottobrunn only)
    daily_downlink_budget_mb: 27.0 # PDR Section 3.2.3: "27 MB" with GSaaS; configurable

# -- Data Storage ----------------------------------------------------------
storage:
  obc_capacity_mb: 4096            # 50% of 8 GB OBC storage = 4096 MB
  jetson_capacity_mb: 249036.8        # Jetson Orin Nano storage (95% of 256 GB = 249036.8 MB, accounting for filesystem overhead and reserved space)
  observation_size_mb: 9.41       # Measured: 6.64 MB / 42.36 s × 60 s/obs = 9.41 MB raw
  compression_ratio: 5.11         # Measured: 6.64 MB raw / 1.3 MB compressed = 5.11:1
  jetson_to_obc_rate_kbps: 50     # Internal bus transfer rate (PDR)

# -- Payload ---------------------------------------------------------------
payload:
  event_camera:
    resolution: [720, 1280]
    type: "Prophesee"
  frame_camera:
    type: "context_camera"
  jetson:
    model: "Orin Nano"
    power_observe_w: 11.5         # PDR Table 6.2 (payload column)
    power_compress_w: 7.0
  observation_duration_s: 60      # PDR: 60s panning at 1 deg/min
  compression_time_factor: 2.0    # PDR: compression takes ~2x observation time
  detection_time_s: 300           # 5 min per compressed observation (CV inference)
  calibration_duration_s: 120     # ~2 min

# -- Operational Modes -----------------------------------------------------
# From PDR Chapter 3 & Table 3.1
modes:
  available:
    - charging          # Default mode; sun-pointing, payload off
    - communication     # S-band + UHF active; requires fine pointing
    - payload_observe   # Event camera recording; requires dark-sky pointing
    - payload_compress  # Jetson compresses data; payload active, camera off
    - payload_detect    # Jetson CV detection/classification on compressed data
    - payload_send      # Jetson→OBC data transfer via RS-485 (50 kbps, one-way)
    - safe              # UHF only; entered via FDIR
  default: charging
  constraints:
    communication:
      requires_ground_pass: true
      requires_fine_pointing: true
    payload_observe:
      requires_eclipse: false       # Prefer eclipse but not mandatory
      min_battery_soc: 0.4
    payload_compress:
      min_battery_soc: 0.3
    payload_detect:
      min_battery_soc: 0.3
    payload_send:
      min_battery_soc: 0.3          # Jetson must be on for RS-485 TX
  # P2: Mode transition overhead (ADCS thesis: 135s attitude settling)
  transition_overhead:
    settling_time_s: 135.0          # ADCS thesis: time to reach 0.5 deg pointing error
    attitude_maneuver_modes:
      - payload_observe             # Requires dark-sky pointing
      - communication               # Requires fine pointing to ground station

# -- Thermal Model ----------------------------------------------------------
# Thermal model removed: heat dissipation design in progress (not a current constraint).
# Jetson limited by energy budget and Jetson→OBC→S-band data pipeline.

# -- Reward Function --------------------------------------------------------
# Individual Negative (autops-rl Case 2, EUCASS 2025)
# R_total = alpha * [R_resource + R_action - beta * R_mission]
rewards:
  reward_scale: 0.01              # alpha: global scaling factor
  resource_penalty_factor: 1.0    # k: weight of resource penalty
  battery_low_threshold: 0.3      # Penalize below this SoC
  storage_high_threshold: 0.8     # Penalize above this usage ratio
  standby_penalty: 0.05           # p_standby: idle (charging) penalty
  safe_penalty: 0.3               # Forced safe mode penalty
  observe_reward: 1.0             # r_obs: fixed observation reward
  compress_reward: 0.5            # Successful compression reward
  failed_action_penalty: 0.1      # delta: failed action penalty
  comm_reward_factor: 1.0         # gamma: comm reward per MB
  comm_reward_cap: 5.0            # R_max: comm reward cap
  mission_scale: 1.0              # beta: mission penalty weight

# -- Mission Objectives ----------------------------------------------------
objectives:
  total_observation_hours: 2.0           # Threshold mission success
  min_downlinked_data_mb: 221            # 2 hours × 120 obs × 1.84 MB compressed (9.41/5.11)
  mission_duration_days: 90              # Primary objectives in 3 months
  observations_per_day_target: 4         # ~4 min payload use per day

# -- Task Types -------------------------------------------------------------
# These are the autonomous decisions the agent must make
task_types:
  - schedule_observation      # When and where to point for science
  - schedule_downlink         # Which data to downlink during comm windows
  - manage_power              # Mode transitions to maintain power budget
  - respond_to_anomaly        # Handle thermal, ADCS, or storage anomalies
  - calibrate_payload         # When to run calibration mode
